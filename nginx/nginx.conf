# Single-node reverse proxy - NOT a substitute for a real load balancer
# across multiple backend replicas; add nginx as a fourth docker-compose
# service with this config mounted if you want to demo this locally.
#
# This file is NOT wired into docker-compose.yml. To try it:
#
#   nginx:
#     image: nginx:alpine
#     depends_on:
#       - backend
#       - frontend
#     ports:
#       - "80:80"
#     volumes:
#       - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
#
# Assumes it runs inside the same docker-compose network as the
# `backend` and `frontend` services, so their container/service names
# resolve via Docker's embedded DNS.

server {
    listen 80;
    server_name localhost;

    # Proxy API calls to the FastAPI backend.
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # FastAPI docs, also served through the same backend.
    location /docs {
        proxy_pass http://backend:8000/docs;
        proxy_set_header Host $host;
    }

    location /redoc {
        proxy_pass http://backend:8000/redoc;
        proxy_set_header Host $host;
    }

    # Everything else goes to the Next.js frontend.
    location / {
        proxy_pass http://frontend:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
